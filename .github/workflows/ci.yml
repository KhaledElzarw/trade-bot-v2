name: CI

on:
  push:
  pull_request:

env:
  PYTHON_VERSION: "3.11"

jobs:
  # Gate 1 — repository hygiene
  hygiene:
    name: "Gate 1 - repository hygiene"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install -r requirements-dev.txt
      - name: Hygiene tests
        run: python -m pytest tests/test_repo_hygiene.py -q
      - name: No tracked runtime artifacts, databases or secrets
        run: |
          set -e
          fail() { echo "::error::$1"; exit 1; }
          git ls-files | grep -E '\.(db|sqlite|sqlite3|pid|log)$' && fail "tracked runtime artifact" || true
          git ls-files | grep -E '^(state|cumulative|runtime_state|ai_signal|engine_status)\.json$' && fail "tracked runtime json" || true
          git ls-files | grep -E '^trades\.jsonl$' && fail "tracked trade log" || true
          git ls-files | grep -E '^(runtime/|strategy_bundles/)' && fail "tracked runtime dir" || true
          git ls-files | grep -E '^\.env$' && fail "tracked .env" || true
          echo "hygiene ok"
      - name: Whitespace and conflict markers
        run: git diff --check

  # Gate 2 — Python correctness
  correctness:
    name: "Gate 2 - Python correctness"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install -r requirements-dev.txt
      - name: Ruff
        run: python -m ruff check .
      - name: Mypy (new package)
        run: python -m mypy tradebot
      - name: Compile all
        run: python -m compileall -q .
      - name: Tests with coverage
        run: |
          python -m coverage erase
          python -m coverage run -m pytest -q
      - name: Coverage - new tradebot package (ratchet)
        # Honest current floor. docs/testing.md records the exact remaining
        # gap and the path to 100%. Raise this number, never lower it.
        run: |
          python -m coverage report -m --include='tradebot/*' --fail-under=97
          python -m coverage json -o coverage.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.json

  # Gate 3 — security
  security:
    name: "Gate 3 - security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install -r requirements-dev.txt
      - name: Bandit
        run: python -m bandit -r tradebot -c pyproject.toml
      - name: pip-audit
        run: python -m pip_audit -r requirements.txt
      - name: Plugin isolation, SSRF and API security suites
        run: |
          python -m pytest -q \
            tests/tradebot/test_plugin_validator.py \
            tests/tradebot/test_plugin_worker.py \
            tests/tradebot/test_data_broker.py \
            tests/tradebot/test_api.py \
            tests/tradebot/test_dashboard_v2_js.py \
            tests/tradebot/test_operations.py
      - name: Secret-pattern scan
        run: |
          set -e
          if git grep -nIE '(AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----|xox[baprs]-[0-9A-Za-z-]{10,})' -- . ':!tests' ':!docs'; then
            echo "::error::possible tracked secret"; exit 1
          fi
          echo "no secret patterns found"

  # Gate 4 — database
  database:
    name: "Gate 4 - database"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install -r requirements-dev.txt
      - name: Migration, integrity and promotion fault injection
        run: |
          python -m pytest -q \
            tests/tradebot/test_database.py \
            tests/tradebot/test_promotion.py \
            tests/test_migrate_to_sqlite.py

  # Gate 5 — frontend
  frontend:
    name: "Gate 5 - frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install -r requirements-dev.txt
      - name: JavaScript syntax check
        run: |
          node --check dashboard/static/dashboard.v1.js
          node --check dashboard/static/dashboard.v2.js
      - name: Frontend safety tests (DOM sinks, URL vetting)
        run: python -m pytest -q tests/tradebot/test_dashboard_v2_js.py tests/test_dashboard_realtime_js.py

  # Gate 6 — deterministic replay
  replay:
    name: "Gate 6 - deterministic replay"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install -r requirements-dev.txt
      - name: Accounting goldens, A01/A02 regressions, 25-wallet replay, ranking
        run: |
          python -m pytest -q \
            tests/tradebot/test_money.py \
            tests/tradebot/test_ledger.py \
            tests/tradebot/test_execution.py \
            tests/tradebot/test_liquidation.py \
            tests/tradebot/test_replay_25_wallets.py \
            tests/tradebot/test_strategies_contract.py \
            tests/tradebot/test_evolution_rules.py

  # Gate 7 — performance
  performance:
    name: "Gate 7 - performance"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install -r requirements-dev.txt
      - name: 25-wallet tick performance budget (measured baseline)
        run: python -m pytest -q tests/tradebot/test_performance.py -p no:randomly

  # Gate 8 — release candidate
  release:
    name: "Gate 8 - release candidate"
    runs-on: ubuntu-latest
    needs: [hygiene, correctness, security, database, frontend, replay, performance]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install -r requirements-dev.txt
      - name: Full suite
        run: python -m pytest -q
      - name: Tests must not mutate the working tree
        run: |
          git status --short
          test -z "$(git status --porcelain)" || { echo "::error::tests produced runtime side effects"; exit 1; }
      - name: Required documentation present
        run: |
          set -e
          for f in README.md SECURITY.md OPERATIONS.md \
                   docs/architecture.md docs/accounting-model.md \
                   docs/execution-model.md docs/strategy-plugin-sdk.md \
                   docs/evolution-policy.md docs/dark-horse.md \
                   docs/data-broker.md docs/database-schema.md \
                   docs/threat-model.md docs/testing.md \
                   docs/migration-and-rollback.md docs/release-checklist.md \
                   docs/runtime-artifacts.md docs/implementation-progress.md \
                   docs/audits/evolutionary-platform-baseline.md; do
            test -f "$f" || { echo "::error::missing required doc: $f"; exit 1; }
          done
          echo "all required docs present"
